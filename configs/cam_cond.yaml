project_root: "."

paths:
  labels: "data/labels_with_images.csv"
  splits: "data/splits/loco_5fold.json"
  images: "data/images"
  results: "results_cam_cond"

save: true

experiments:
  # Camera-conditioned head (report Analysis #7): per-camera embedding added to image
  # features; unknown token (idx 0) for LOCO test cams via cam_dropout. Tests whether a
  # per-camera prior closes the LOCO gap. Expected: val ~ baseline; test drops by ?
  - name: "cam_cond_resnet50"
    model: "resnet50"
    folds: [0, 1, 2, 3, 4]
    epochs: 50
    batch_size: 128
    lr: 0.001
    num_workers: 4
    seed: 0
    cam_embedding_dim: 64
    cam_dropout_prob: 0.05
    run_name_template: "cam_cond_resnet50_fold{fold}"
